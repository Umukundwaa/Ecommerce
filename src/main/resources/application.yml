server:
  port: 8080

spring:
  application:
    name: ecommerce-api

  # H2 in-memory database (easy to run without installing anything)
  datasource:
    url: jdbc:h2:mem:ecommerce
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop   # recreates DB on each run (good for dev)
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # OAuth2 - replace with real credentials from Google Cloud Console
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: YOUR_GOOGLE_CLIENT_ID
            client-secret: YOUR_GOOGLE_CLIENT_SECRET
            scope: openid, profile, email
          github:
            client-id: YOUR_GITHUB_CLIENT_ID
            client-secret: YOUR_GITHUB_CLIENT_SECRET
            scope: user:email

# JWT settings
jwt:
  secret: myVerySecretKeyThatIsAtLeast256BitsLongForHS256AlgorithmToWork!!
  expiration: 86400000   # 24 hours in milliseconds (use 900000 = 15 min in production)

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Logging
logging:
  level:
    com.ecommerce: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
